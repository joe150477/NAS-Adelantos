  <script>
    // ===== DATA LAYER =====
    const DB = {
      get: (key, def) => { try { return JSON.parse(localStorage.getItem(key) || 'null') || def; } catch(e) { return def; } },
      set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
      now: () => new Date().toISOString(),
      id: () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5)
    };
    const KEYS = { TEACHERS: 'ep_teachers', LOANS: 'ep_loans', PAYMENTS: 'ep_payments' };
    function getTeachers() { return DB.get(KEYS.TEACHERS, []); }
    function setTeachers(t) { DB.set(KEYS.TEACHERS, t); }
    function getLoans() { return DB.get(KEYS.LOANS, []); }
    function setLoans(l) { DB.set(KEYS.LOANS, l); }
    function getPayments() { return DB.get(KEYS.PAYMENTS, []); }
    function setPayments(p) { DB.set(KEYS.PAYMENTS, p); }
    
    // ===== UI UTILITIES =====
    function $(id) { return document.getElementById(id); }
    function showToast(msg, type) {
      type = type || 'success';
      const t = $('toast'), icon = $('toastIcon'), m = $('toastMsg');
      m.textContent = msg;
      icon.textContent = type === 'success' ? '✓' : type === 'warning' ? '!' : '✕';
      t.className = 'toast ' + type + ' show';
      setTimeout(() => t.classList.remove('show'), 2800);
    }
    function openSheet(html) {
      $('sheetContent').innerHTML = html;
      $('sheetOverlay').classList.add('active');
      $('sheet').classList.add('active');
    }
    function closeSheet() {
      $('sheet').classList.remove('active');
      $('sheetOverlay').classList.remove('active');
    }
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      $(id).classList.add('active');
      window.scrollTo(0, 0);
    }
    function formatCurrency(n) {
      return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n || 0);
    }
    function formatDate(d) {
      if (!d) return '';
      const date = new Date(d + 'T00:00:00');
      return date.toLocaleDateString('es-CO', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function formatMonthYear(d) {
      if (!d) return '';
      const date = new Date(d + 'T00:00:00');
      return date.toLocaleDateString('es-CO', { month: 'short', year: 'numeric' });
    }
    function escapeHtml(s) {
      const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;
    }
    function parseMoney(v) {
      const n = parseFloat(String(v).replace(/[^0-9.-]/g, ''));
      return isNaN(n) ? 0 : Math.round(n);
    }
    function addMonths(dateStr, months) {
      const d = new Date(dateStr + 'T00:00:00');
      d.setMonth(d.getMonth() + months);
      return d.toISOString().split('T')[0];
    }
    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }
    function daysBetween(a, b) {
      const d1 = new Date(a + 'T00:00:00');
      const d2 = new Date(b + 'T00:00:00');
      return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
    }
    function copyToClipboard(text) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => showToast('Copiado al portapapeles'));
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Copiado al portapapeles');
      }
    }
    
    // ===== SERVICE WORKER =====
    const swCode = `const CACHE='edu-descuentos-v2';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(c=>c!==CACHE).map(c=>caches.delete(c))))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const c=res.clone();caches.open(CACHE).then(ca=>ca.put(e.request,c));return res;})).catch(()=>caches.match(e.request))));`;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register(swUrl).catch(()=>{});
    
    // ===== LOAN TYPE LABELS =====
    const LOAN_TYPES = {
      advance: { label: 'Adelanto de salario', icon: '💰', class: 'advance' },
      cafeteria: { label: 'Merienda / Cafetería', icon: '🍽️', class: 'cafeteria' },
      other: { label: 'Otro consumo', icon: '📋', class: 'other' }
    };
    
    // ===== CALCULATIONS =====
    function getLoanPayments(loanId) {
      return getPayments().filter(p => p.loanId === loanId).sort((a, b) => new Date(a.date) - new Date(b.date));
    }
    function getLoanBalance(loan) {
      const paid = getLoanPayments(loan.id).reduce((s, p) => s + (p.amount || 0), 0);
      return Math.max(0, (loan.amount || 0) - paid);
    }
    function getTeacherBalance(teacherId) {
      return getLoans().filter(l => l.teacherId === teacherId).reduce((s, l) => s + getLoanBalance(l), 0);
    }
    function getTeacherTotalLoaned(teacherId) {
      return getLoans().filter(l => l.teacherId === teacherId).reduce((s, l) => s + (l.amount || 0), 0);
    }
    function getTeacherTotalPaid(teacherId) {
      const loanIds = getLoans().filter(l => l.teacherId === teacherId).map(l => l.id);
      return getPayments().filter(p => loanIds.includes(p.loanId)).reduce((s, p) => s + (p.amount || 0), 0);
    }
    function getAvailableSalary(teacher) {
      return (teacher.salary || 0) - getTeacherBalance(teacher.id);
    }
    
    // ===== MONTH DEDUCTIONS =====
    function getMonthDeductions(teacherId, year, month) {
      const loans = getLoans().filter(l => l.teacherId === teacherId && l.status !== 'paid');
      let total = 0;
      const details = [];
      loans.forEach(loan => {
        const status = getInstallmentStatus(loan);
        status.dates.forEach((date, idx) => {
          if (idx < status.paidCount) return;
          const d = new Date(date + 'T00:00:00');
          if (d.getFullYear() === year && d.getMonth() === month) {
            total += loan.installmentAmount || 0;
            details.push({ loan, date, installmentNumber: idx + 1, amount: loan.installmentAmount || 0 });
          }
        });
      });
      return { total, details };
    }
    
    // ===== INSTALLMENT LOGIC =====
    function generateInstallmentDates(loan) {
      if (!loan.startDate || !loan.installments || loan.installments <= 0) return [];
      const dates = [];
      const start = new Date(loan.startDate + 'T00:00:00');
      const day = loan.installmentDay || start.getDate();
      for (let i = 0; i < loan.installments; i++) {
        const d = new Date(start);
        d.setMonth(d.getMonth() + i);
        d.setDate(Math.min(day, new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate()));
        dates.push(d.toISOString().split('T')[0]);
      }
      return dates;
    }
    function getInstallmentStatus(loan) {
      const payments = getLoanPayments(loan.id);
      const totalPaid = payments.reduce((s, p) => s + (p.amount || 0), 0);
      const dates = generateInstallmentDates(loan);
      let paidCount = 0;
      let nextIndex = -1;
      dates.forEach((date, idx) => {
        const cumulativeExpected = (idx + 1) * (loan.installmentAmount || 0);
        if (totalPaid >= cumulativeExpected) {
          paidCount++;
        } else if (nextIndex === -1) {
          nextIndex = idx;
        }
      });
      if (nextIndex === -1 && paidCount < dates.length) nextIndex = paidCount;
      return { dates, paidCount, totalPaid, nextIndex, remaining: dates.length - paidCount };
    }
    function getUpcomingInstallmentsAll() {
      const today = todayStr();
      const upcoming = [];
      getLoans().forEach(loan => {
        if (loan.status === 'paid') return;
        const status = getInstallmentStatus(loan);
        const teacher = getTeachers().find(t => t.id === loan.teacherId);
        if (!teacher) return;
        status.dates.forEach((date, idx) => {
          if (idx < status.paidCount) return;
          const days = daysBetween(today, date);
          if (days >= -5 && days <= 35) {
            upcoming.push({
              date, days, teacher, loan,
              amount: loan.installmentAmount || 0,
              installmentNumber: idx + 1,
              totalInstallments: status.dates.length
            });
          }
        });
      });
      return upcoming.sort((a, b) => new Date(a.date) - new Date(b.date));
    }
    function getThisMonthTotal() {
      const now = new Date();
      let total = 0;
      getTeachers().forEach(t => {
        total += getMonthDeductions(t.id, now.getFullYear(), now.getMonth()).total;
      });
      return total;
    }
    
    // ===== DASHBOARD =====
    function renderDashboard() {
      const teachers = getTeachers();
      const loans = getLoans();
      const payments = getPayments();
      const totalLoaned = loans.reduce((s, l) => s + (l.amount || 0), 0);
      const totalPaid = payments.reduce((s, p) => s + (p.amount || 0), 0);
      const totalPending = totalLoaned - totalPaid;
      const thisMonth = getThisMonthTotal();
      $('statTotalLoaned').textContent = formatCurrency(totalLoaned);
      $('statTotalRecovered').textContent = formatCurrency(totalPaid);
      $('statTotalPending').textContent = formatCurrency(totalPending);
      $('statThisMonth').textContent = formatCurrency(thisMonth);
      
      const upcoming = getUpcomingInstallmentsAll().slice(0, 5);
      const upcomingDiv = $('upcomingInstallments');
      if (upcoming.length === 0) {
        upcomingDiv.innerHTML = `<div class="empty-state" style="padding:30px 0;"><div class="empty-text">No hay descuentos programados para las próximas semanas</div></div>`;
      } else {
        upcomingDiv.innerHTML = upcoming.map((u, i) => {
          const d = new Date(u.date + 'T00:00:00');
          return `
            <div class="upcoming-item animate-fade stagger-${Math.min(i+1, 5)}" onclick="showLoanDetail('${u.loan.id}')">
              <div class="upcoming-date">
                <div class="upcoming-date-day">${d.getDate()}</div>
                <div class="upcoming-date-month">${d.toLocaleDateString('es-CO', {month:'short'})}</div>
              </div>
              <div class="upcoming-content">
                <div class="upcoming-title">${escapeHtml(u.teacher.name)}</div>
                <div class="upcoming-desc">Cuota ${u.installmentNumber}/${u.totalInstallments} · ${u.days === 0 ? 'Este mes' : u.days > 0 ? 'En ' + u.days + ' días' : 'Ya pasó ' + Math.abs(u.days) + ' días'}</div>
              </div>
              <div class="upcoming-amount">${formatCurrency(u.amount)}</div>

        list.innerHTML = `
          <div class="empty-state animate-fade">
            <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
            <div class="empty-title">No hay docentes</div>
            <div class="empty-text">Agrega docentes para comenzar a registrar adelantos, meriendas y descuentos de nómina.</div>
          </div>`;
        return;
      }
      list.innerHTML = teachers.map((t, i) => {
        const balance = getTeacherBalance(t.id);
        const totalLoanedT = getTeacherTotalLoaned(t.id);
        const initials = (t.name || '').split(' ').map(w => w[0]).join('').substr(0, 2).toUpperCase();
        return `
          <div class="list-item animate-fade stagger-${Math.min(i+1, 5)}" onclick="showTeacherDetail('${t.id}')">
            <div class="list-avatar">${escapeHtml(initials)}</div>
            <div class="list-content">
              <div class="list-title">${escapeHtml(t.name)}</div>
              <div class="list-subtitle">Total adeudado: ${formatCurrency(totalLoanedT)}</div>
            </div>
            <div class="list-meta">
              <div class="list-amount ${balance > 0 ? 'negative' : 'positive'}">${formatCurrency(balance)}</div>
              <div class="list-badge ${balance > 0 ? 'badge-warning' : 'badge-success'}">${balance > 0 ? 'Por descontar' : 'Al día'}</div>
            </div>
          </div>`;
      }).join('');
    }
    
    // ===== MONTH PAYROLL SHEET =====
    function openSheetMonthPayroll() {
      const now = new Date();
      const monthName = now.toLocaleDateString('es-CO', { month: 'long', year: 'numeric' });
      const teachers = getTeachers();
      let totalDeductions = 0;
      let totalNet = 0;
      
      const rows = teachers.map(t => {
        const ded = getMonthDeductions(t.id, now.getFullYear(), now.getMonth());
        const net = (t.salary || 0) - ded.total;
        totalDeductions += ded.total;
        totalNet += net;
        if (ded.total === 0) return '';
        return `
          <div class="payroll-teacher-card animate-fade">
            <div class="payroll-teacher-header">
              <div class="payroll-teacher-name">${escapeHtml(t.name)}</div>
              <div class="payroll-teacher-net">${formatCurrency(net)}</div>
            </div>
            <div class="payroll-teacher-detail">Salario: ${formatCurrency(t.salary)} · Descuento: <span>${formatCurrency(ded.total)}</span></div>
            <div style="margin-top:8px;font-size:12px;color:var(--text-muted);">
              ${ded.details.map(d => `Cuota ${d.installmentNumber} · ${formatDate(d.date)} · ${formatCurrency(d.amount)}`).join('<br>')}
            </div>
          </div>`;
      }).join('');
      
      openSheet(`
        <div class="sheet-title">Nómina de ${monthName}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;">
          <div class="installment-summary-item"><div class="installment-summary-value" style="color:var(--text-primary)">${teachers.length}</div><div class="installment-summary-label">Docentes</div></div>
          <div class="installment-summary-item"><div class="installment-summary-value" style="color:var(--danger)">${formatCurrency(totalDeductions)}</div><div class="installment-summary-label">Descuentos</div></div>
          <div class="installment-summary-item"><div class="installment-summary-value" style="color:var(--success)">${formatCurrency(totalNet)}</div><div class="installment-summary-label">Total a pagar</div></div>
        </div>
        ${rows || '<div class="empty-state" style="padding:30px 0;"><div class="empty-text">No hay descuentos programados para este mes</div></div>'}
      `);
    }
    
    // ===== TEACHER DETAIL =====
    let currentTeacherId = null;
    let currentLoanId = null;
    let teacherDetailTab = 'loans';
    function showTeacherDetail(id) {
      currentTeacherId = id;
      teacherDetailTab = 'loans';
      renderTeacherDetail();
      showScreen('screenTeacher');
    }
    function renderTeacherDetail() {
      const teacher = getTeachers().find(t => t.id === currentTeacherId);
      if (!teacher) return showScreen('screenDashboard');
      const balance = getTeacherBalance(teacher.id);
      const totalLoaned = getTeacherTotalLoaned(teacher.id);
      const totalPaid = getTeacherTotalPaid(teacher.id);
      const availableSalary = getAvailableSalary(teacher);
      const initials = (teacher.name || '').split(' ').map(w => w[0]).join('').substr(0, 2).toUpperCase();
      const loans = getLoans().filter(l => l.teacherId === teacher.id).sort((a, b) => new Date(b.date) - new Date(a.date));
      const allLoanIds = loans.map(l => l.id);
      const allPayments = getPayments().filter(p => allLoanIds.includes(p.loanId)).sort((a, b) => new Date(b.date) - new Date(a.date));
      
      // Month payroll for this teacher
      const now = new Date();
      const monthDed = getMonthDeductions(teacher.id, now.getFullYear(), now.getMonth());
      const monthName = now.toLocaleDateString('es-CO', { month: 'long' });
      
      let content = `
        <div class="detail-header animate-fade">
          <div class="detail-avatar">${escapeHtml(initials)}</div>
          <div class="detail-name">${escapeHtml(teacher.name)}</div>
          <div class="detail-role">${escapeHtml(teacher.role || 'Docente')}</div>
          <div class="detail-salary">Salario: <strong>${formatCurrency(teacher.salary)}</strong> · Disponible: <strong style="color:${availableSalary >= 0 ? 'var(--success)' : 'var(--danger)'}">${formatCurrency(availableSalary)}</strong></div>
        </div>`;
      
      // This month payroll card
      content += `
        <div class="payroll-card animate-fade stagger-1">
          <div class="payroll-title">${monthName} — Resumen de nómina</div>
          <div class="payroll-row"><span class="payroll-label">Salario bruto</span><span class="payroll-value">${formatCurrency(teacher.salary)}</span></div>
          <div class="payroll-row"><span class="payroll-label">Descuentos este mes</span><span class="payroll-value deduction">-${formatCurrency(monthDed.total)}</span></div>
          ${monthDed.details.length > 0 ? `<div style="font-size:12px;color:var(--text-muted);margin:4px 0 8px;padding-left:8px;">${monthDed.details.map(d => `• Cuota ${d.installmentNumber} de ${(LOAN_TYPES[d.loan.type]||LOAN_TYPES.other).label.toLowerCase()}: ${formatCurrency(d.amount)}`).join('<br>')}</div>` : ''}
          <div class="payroll-total"><span class="payroll-label" style="font-size:15px;">A pagar este mes</span><span class="payroll-value net">${formatCurrency((teacher.salary || 0) - monthDed.total)}</span></div>
        </div>
        
        <div style="padding:0 20px 16px;">
          <button class="copy-btn" onclick="copyTeacherSummary('${teacher.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copiar resumen para el docente
          </button>
        </div>
        
        <div class="detail-stats animate-fade stagger-2">
          <div class="detail-stat"><div class="detail-stat-value" style="color:var(--accent-light)">${formatCurrency(totalLoaned)}</div><div class="detail-stat-label">Total Adeudado</div></div>
          <div class="detail-stat"><div class="detail-stat-value" style="color:var(--success)">${formatCurrency(totalPaid)}</div><div class="detail-stat-label">Ya Descontado</div></div>
          <div class="detail-stat"><div class="detail-stat-value" style="color:${balance > 0 ? 'var(--danger)' : 'var(--success)'}">${formatCurrency(balance)}</div><div class="detail-stat-label">Por Descontar</div></div>
        </div>
        <div class="tabs animate-fade stagger-3">
          <button class="tab ${teacherDetailTab === 'loans' ? 'active' : ''}" onclick="teacherDetailTab='loans';renderTeacherDetail();">Registros</button>
          <button class="tab ${teacherDetailTab === 'history' ? 'active' : ''}" onclick="teacherDetailTab='history';renderTeacherDetail();">Historial</button>
        </div>
        <div class="content" style="padding-top:8px;">`;
      
      if (teacherDetailTab === 'loans') {
        if (loans.length === 0) {
          content += `
            <div class="empty-state animate-fade">
              <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
              <div class="empty-title">Sin registros</div>
              <div class="empty-text">Este docente no tiene adelantos ni consumos registrados.</div>
            </div>`;
        } else {
          content += loans.map((l, i) => {
            const bal = getLoanBalance(l);
            const pct = l.amount > 0 ? ((l.amount - bal) / l.amount * 100) : 0;
            const status = bal <= 0 ? 'paid' : 'active';
            const typeInfo = LOAN_TYPES[l.type] || LOAN_TYPES.other;
            const instStatus = getInstallmentStatus(l);
            return `
              <div class="loan-card animate-fade stagger-${Math.min(i+1, 5)}" onclick="showLoanDetail('${l.id}')">
                <div class="loan-card-header">
                  <div>
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                      <span class="type-badge ${typeInfo.class}">${typeInfo.icon} ${typeInfo.label}</span>
                      ${l.description ? `<span style="font-size:12px;color:var(--text-muted);">${escapeHtml(l.description)}</span>` : ''}
                    </div>
                    <div class="loan-card-date">${formatDate(l.date)}</div>
                  </div>
                  <div class="list-badge ${status === 'paid' ? 'badge-success' : 'badge-warning'}">${status === 'paid' ? 'Completado' : 'Activo'}</div>
                </div>
                <div class="loan-card-amount currency">${formatCurrency(l.amount)}</div>
                <div class="loan-card-balance">${bal > 0 ? 'Por descontar: ' + formatCurrency(bal) : 'Totalmente descontado'}</div>
                ${l.installments > 0 ? `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">Cuotas: ${instStatus.paidCount}/${l.installments} descontadas · ${formatCurrency(l.installmentAmount || 0)} c/u</div>` : ''}
                ${bal > 0 ? `<div class="progress-bar"><div class="progress-fill ${pct > 75 ? 'success' : pct > 40 ? 'warning' : 'danger'}" style="width:${pct}%"></div></div>` : ''}
                <div class="loan-card-actions" style="margin-top:14px;">
                  <button class="btn btn-success btn-sm" onclick="event.stopPropagation();openSheetAddPayment('${l.id}')">Abono libre</button>
                  <button class="btn btn-info btn-sm" onclick="event.stopPropagation();registerInstallmentPayment('${l.id}')">Descontar cuota</button>
                </div>
              </div>`;
          }).join('');
        }
      } else {
        if (allPayments.length === 0) {
          content += `
            <div class="empty-state animate-fade">
              <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
              <div class="empty-title">Sin movimientos</div>
              <div class="empty-text">No hay descuentos ni abonos registrados.</div>
            </div>`;
        } else {
          content += allPayments.map((p, i) => {
            const loan = loans.find(l => l.id === p.loanId);
            return `
              <div class="timeline-item animate-fade stagger-${Math.min(i+1, 5)}">
                <div class="timeline-dot ${p.type === 'installment' ? 'installment' : p.type === 'salary' ? 'salary' : 'payment'}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    ${p.type === 'installment' ? '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' : p.type === 'salary' ? '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' : '<polyline points="20 6 9 17 4 12"/>'}
                  </svg>
                </div>
                <div class="timeline-content">
                  <div class="timeline-title">${p.type === 'installment' ? 'Descuento de cuota #' + (p.installmentNumber || '') : p.type === 'salary' ? 'Descuento de salario' : 'Abono libre'}</div>
                  <div class="timeline-desc">${loan ? (LOAN_TYPES[loan.type] || LOAN_TYPES.other).label + ' del ' + formatDate(loan.date) : ''}</div>
                  <div class="timeline-date">${formatDate(p.date)}${p.notes ? ' · ' + escapeHtml(p.notes) : ''}</div>
                </div>
                <div class="timeline-amount positive">${formatCurrency(p.amount)}</div>
              </div>`;
          }).join('');
        }
      }
      content += `</div>`;
      $('teacherDetailContent').innerHTML = content;
    }
    
    // ===== COPY TEACHER SUMMARY =====
    function copyTeacherSummary(teacherId) {
      const teacher = getTeachers().find(t => t.id === teacherId);
      if (!teacher) return;
      const now = new Date();
      const monthDed = getMonthDeductions(teacherId, now.getFullYear(), now.getMonth());
      const loans = getLoans().filter(l => l.teacherId === teacherId).sort((a, b) => new Date(b.date) - new Date(a.date));
      const allPayments = getPayments().filter(p => loans.some(l => l.id === p.loanId)).sort((a, b) => new Date(b.date) - new Date(a.date));
      
      let text = `📋 RESUMEN DE NÓMINA — ${teacher.name.toUpperCase()}\n`;
      text += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
      text += `💰 Salario bruto: ${formatCurrency(teacher.salary)}\n`;
      text += `➖ Descuentos ${now.toLocaleDateString('es-CO', {month:'long'})}: ${formatCurrency(monthDed.total)}\n`;
      if (monthDed.details.length > 0) {
        monthDed.details.forEach(d => {
          text += `   • Cuota ${d.installmentNumber} de ${(LOAN_TYPES[d.loan.type]||LOAN_TYPES.other).label}: ${formatCurrency(d.amount)}\n`;
        });
      }
      text += `✅ A pagar este mes: ${formatCurrency((teacher.salary || 0) - monthDed.total)}\n\n`;
      
      text += `📊 HISTORIAL COMPLETO\n`;
      text += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
      if (loans.length === 0) {
        text += `No hay registros.\n`;
      } else {
        loans.forEach(l => {
          const typeInfo = LOAN_TYPES[l.type] || LOAN_TYPES.other;
          const bal = getLoanBalance(l);
          const paid = (l.amount || 0) - bal;
          text += `\n${typeInfo.icon} ${typeInfo.label}\n`;
          text += `   Fecha: ${formatDate(l.date)}\n`;
          text += `   Monto total: ${formatCurrency(l.amount)}\n`;
          text += `   Descontado: ${formatCurrency(paid)}\n`;
          text += `   Por descontar: ${formatCurrency(bal)}\n`;
          if (l.installments > 0) {
            text += `   Cuotas: ${l.installments} de ${formatCurrency(l.installmentAmount || 0)} c/u\n`;
            text += `   Desde: ${formatDate(l.startDate)} hasta ${formatDate(l.endDate)}\n`;
          }
          if (l.description) text += `   Detalle: ${l.description}\n`;
        });
      }
      
      text += `\n📅 DESCUENTOS REALIZADOS\n`;
      text += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
      if (allPayments.length === 0) {
        text += `Aún no se han realizado descuentos.\n`;
      } else {
        allPayments.forEach(p => {
          const loan = loans.find(l => l.id === p.loanId);
          const label = p.type === 'installment' ? `Cuota #${p.installmentNumber}` : p.type === 'salary' ? 'Descuento salario' : 'Abono libre';
          text += `• ${formatDate(p.date)} — ${label}: ${formatCurrency(p.amount)}\n`;
        });
      }
      
      text += `\n💡 Total adeudado: ${formatCurrency(getTeacherBalance(teacherId))}\n`;
      text += `Generado el ${now.toLocaleDateString('es-CO')}`;
      
      copyToClipboard(text);
    }
    
    // ===== LOAN DETAIL =====
    function showLoanDetail(loanId) {
      currentLoanId = loanId;
      renderLoanDetail();
      showScreen('screenLoan');
    }
    function goBackFromLoan() {
      const loan = getLoans().find(l => l.id === currentLoanId);
      if (loan) showTeacherDetail(loan.teacherId);
      else showScreen('screenDashboard');
    }
    function renderLoanDetail() {
      const loan = getLoans().find(l => l.id === currentLoanId);
      if (!loan) return goBackFromLoan();
      const teacher = getTeachers().find(t => t.id === loan.teacherId);
      const payments = getLoanPayments(loan.id);
      const balance = getLoanBalance(loan);
      const pct = loan.amount > 0 ? ((loan.amount - balance) / loan.amount * 100) : 0;
      const typeInfo = LOAN_TYPES[loan.type] || LOAN_TYPES.other;
      const instStatus = getInstallmentStatus(loan);
      
      let content = `
        <div class="detail-header animate-fade">
          <div style="margin-bottom:12px;"><span class="type-badge ${typeInfo.class}">${typeInfo.icon} ${typeInfo.label}</span></div>
          <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">${teacher ? escapeHtml(teacher.name) : ''}</div>
          <div class="detail-name">${loan.description ? escapeHtml(loan.description) : typeInfo.label}</div>
          <div class="detail-role">${formatDate(loan.date)}</div>
          <div class="detail-salary">Monto: <strong>${formatCurrency(loan.amount)}</strong> · Por descontar: <strong style="color:${balance > 0 ? 'var(--danger)' : 'var(--success)'}">${formatCurrency(balance)}</strong></div>
        </div>`;
      
      if (loan.installments > 0) {
        content += `
          <div class="dashboard-card animate-fade stagger-1" style="margin:16px 20px;">
            <div class="dashboard-card-header">
              <div>
                <div class="dashboard-card-title">Plan de descuentos</div>
                <div class="dashboard-card-subtitle">Descuentos pactados de nómina</div>
              </div>
            </div>
            <div class="condition-row"><span class="condition-label">Inicio descuento</span><span class="condition-value">${formatDate(loan.startDate)}</span></div>
            <div class="condition-row"><span class="condition-label">Fin descuento</span><span class="condition-value">${formatDate(loan.endDate)}</span></div>
            <div class="condition-row"><span class="condition-label">Número de cuotas</span><span class="condition-value">${loan.installments}</span></div>
            <div class="condition-row"><span class="condition-label">Monto por cuota</span><span class="condition-value">${formatCurrency(loan.installmentAmount)}</span></div>
            <div class="condition-row"><span class="condition-label">Día de descuento</span><span class="condition-value">${loan.installmentDay || 'No definido'}</span></div>
          </div>`;
        
        content += `
          <div class="animate-fade stagger-2" style="padding:0 20px;">
            <div class="installment-summary">
              <div class="installment-summary-item"><div class="installment-summary-value" style="color:var(--success)">${instStatus.paidCount}</div><div class="installment-summary-label">Descontadas</div></div>
              <div class="installment-summary-item"><div class="installment-summary-value" style="color:var(--warning)">${instStatus.remaining}</div><div class="installment-summary-label">Por descontar</div></div>
              <div class="installment-summary-item"><div class="installment-summary-value" style="color:var(--accent-light)">${instStatus.nextIndex >= 0 ? instStatus.nextIndex + 1 : '-'}</div><div class="installment-summary-label">Próxima</div></div>
            </div>
            <div class="progress-bar" style="height:8px;"><div class="progress-fill ${pct > 75 ? 'success' : pct > 40 ? 'warning' : 'danger'}" style="width:${pct}%"></div></div>
            <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--text-muted);">
              <span>${pct.toFixed(0)}% descontado</span>
              <span>${formatCurrency(loan.amount - balance)} de ${formatCurrency(loan.amount)}</span>
            </div>
          </div>`;
        
        if (instStatus.dates.length > 0) {
          content += `
            <div class="animate-fade stagger-3" style="padding:0 20px;margin-top:20px;">
              <div class="section-title" style="margin-top:0;">Calendario de descuentos</div>
              <div class="installment-grid">`;
          instStatus.dates.forEach((date, idx) => {
            const isPaid = idx < instStatus.paidCount;
            const isNext = idx === instStatus.nextIndex;
            const d = new Date(date + 'T00:00:00');
            content += `<div class="installment-cell ${isPaid ? 'paid' : 'pending'} ${isNext ? 'next' : ''}" title="${formatDate(date)}">${d.getDate()}</div>`;
          });
          content += `</div>
            <div class="installment-legend">
              <div class="installment-legend-item"><div class="installment-legend-dot" style="background:rgba(52,211,153,0.3);"></div>Descontada</div>
              <div class="installment-legend-item"><div class="installment-legend-dot" style="background:rgba(255,255,255,0.05);border:1px solid var(--border-glass);"></div>Por descontar</div>
              <div class="installment-legend-item"><div class="installment-legend-dot" style="box-shadow:0 0 0 2px var(--accent);background:transparent;"></div>Próxima</div>
            </div>
          </div>`;
        }
      }
      
      content += `
        <div class="action-row animate-fade stagger-4">
          <button class="btn btn-success" onclick="openSheetAddPayment('${loan.id}')">Abono libre</button>
          ${loan.installments > 0 ? `<button class="btn btn-info" onclick="registerInstallmentPayment('${loan.id}')">Descontar cuota</button>` : `<button class="btn btn-secondary" onclick="openSheetAddPayment('${loan.id}', true)">Descontar salario</button>`}
        </div>
        <div class="section-title" style="padding:0 20px;">Historial de descuentos</div>
        <div class="content" style="padding-top:0;">`;
      
      if (payments.length === 0) {
        content += `
          <div class="empty-state animate-fade">
            <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
            <div class="empty-title">Sin descuentos</div>
            <div class="empty-text">Aún no se han registrado descuentos para este registro.</div>
          </div>`;
      } else {
        content += payments.map((p, i) => `
          <div class="timeline-item animate-fade stagger-${Math.min(i+1, 5)}">
            <div class="timeline-dot ${p.type === 'installment' ? 'installment' : p.type === 'salary' ? 'salary' : 'payment'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                ${p.type === 'installment' ? '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' : p.type === 'salary' ? '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' : '<polyline points="20 6 9 17 4 12"/>'}
              </svg>
            </div>
            <div class="timeline-content">
              <div class="timeline-title">${p.type === 'installment' ? 'Descuento de cuota #' + (p.installmentNumber || '') : p.type === 'salary' ? 'Descuento de salario' : 'Abono libre'}</div>
              <div class="timeline-date">${formatDate(p.date)}${p.notes ? ' · ' + escapeHtml(p.notes) : ''}</div>
            </div>
            <div class="timeline-amount positive">${formatCurrency(p.amount)}</div>
          </div>
        `).join('');
      }
      content += `</div>`;
      $('loanDetailContent').innerHTML = content;
    }
    
    // ===== SHEETS: ADD TEACHER =====
    function openSheetAddTeacher() {
      openSheet(`
        <div class="sheet-title">Nuevo Docente</div>
        <form onsubmit="event.preventDefault(); saveTeacher();">
          <div class="input-group"><label>Nombre completo</label><input type="text" class="input" id="tName" placeholder="Ej: María González" required></div>
          <div class="input-group"><label>Cargo / Asignatura</label><input type="text" class="input" id="tRole" placeholder="Ej: Profesora de Matemáticas"></div>
          <div class="input-group"><label>Salario mensual</label><input type="number" class="input" id="tSalary" placeholder="Ej: 2500000" min="0" step="1000"></div>
          <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">Guardar Docente</button>
        </form>
      `);
      setTimeout(() => $('tName').focus(), 350);
    }
    function saveTeacher() {
      const name = $('tName').value.trim();
      const role = $('tRole').value.trim();
      const salary = parseMoney($('tSalary').value);
      if (!name) { showToast('Ingresa el nombre del docente', 'error'); return; }
      const teachers = getTeachers();
      teachers.push({ id: DB.id(), name, role, salary, createdAt: DB.now() });
      setTeachers(teachers);
      closeSheet();
      showToast('Docente agregado');
      renderDashboard();
    }
    
    // ===== SHEETS: ADD LOAN =====
    let selectedLoanType = 'advance';
    function openSheetAddLoan() {
      const teachers = getTeachers();
      if (teachers.length === 0) {
        openSheet(`
          <div class="sheet-title">Nuevo Registro</div>
          <div class="empty-state" style="padding:40px 0;">
            <div class="empty-icon" style="width:60px;height:60px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
            <div class="empty-title">Primero agrega un docente</div>
            <div class="empty-text">Necesitas registrar al menos un docente antes de crear un registro.</div>
          </div>
          <button class="btn btn-primary btn-block" onclick="closeSheet();setTimeout(openSheetAddTeacher,300);">Agregar Docente</button>
        `);
        return;
      }
      const options = teachers.map(t => `<option value="${t.id}">${escapeHtml(t.name)}</option>`).join('');
      selectedLoanType = 'advance';
      openSheet(`
        <div class="sheet-title">Nuevo Registro</div>
        <form onsubmit="event.preventDefault(); saveLoan();">
          <div class="input-group"><label>Tipo</label>
            <div class="radio-group">
              <div class="radio-option selected" onclick="selectLoanType(this, 'advance')" data-type="advance"><div class="radio-icon">💰</div><div class="radio-label">Adelanto</div><div class="radio-sublabel">De salario</div></div>
              <div class="radio-option" onclick="selectLoanType(this, 'cafeteria')" data-type="cafeteria"><div class="radio-icon">🍽️</div><div class="radio-label">Merienda</div><div class="radio-sublabel">Cafetería</div></div>
              <div class="radio-option" onclick="selectLoanType(this, 'other')" data-type="other"><div class="radio-icon">📋</div><div class="radio-label">Otro</div><div class="radio-sublabel">Consumo/vario</div></div>
            </div>
          </div>
          <div class="input-group"><label>Docente</label><select class="input" id="lTeacher" required>${options}</select></div>
          <div class="input-group" id="descGroup" style="display:none;"><label>Descripción (qué consumió)</label><input type="text" class="input" id="lDescription" placeholder="Ej: Almuerzo + jugo + galletas"></div>
          <div class="input-group"><label>Monto</label><input type="number" class="input" id="lAmount" placeholder="Ej: 500000" min="1" step="1000" required></div>
          <div class="input-group"><label>Fecha del registro</label><input type="date" class="input" id="lDate" required></div>
          <div style="background:var(--bg-glass);border-radius:var(--radius-sm);padding:16px;margin-bottom:20px;border:1px solid var(--border-glass);">
            <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.8px;">Plan de descuentos de nómina</div>
            <div class="input-group"><label>Inicio descuento</label><input type="date" class="input" id="lStartDate"></div>
            <div class="input-group"><label>Número de cuotas</label><input type="number" class="input" id="lInstallments" placeholder="Ej: 3" min="1" max="48" onchange="calculateInstallment()"></div>
            <div class="input-group"><label>Día de descuento (del mes)</label><input type="number" class="input" id="lInstallmentDay" placeholder="Ej: 15" min="1" max="31" onchange="calculateInstallment()"></div>
            <div style="display:flex;gap:10px;">
              <div class="input-group" style="flex:1;"><label>Monto cuota</label><input type="number" class="input" id="lInstallmentAmount" placeholder="Calculado" min="1" step="1000" onchange="calculateInstallmentsFromAmount()"></div>
              <div class="input-group" style="flex:1;"><label>Fin descuento</label><input type="date" class="input" id="lEndDate" readonly style="color:var(--text-muted);"></div>
            </div>
          </div>
          <div class="input-group"><label>Notas adicionales</label><input type="text" class="input" id="lNotes" placeholder="Ej: Urgente, descontar antes de vacaciones"></div>
          <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">Guardar</button>
        </form>
      `);
      $('lDate').valueAsDate = new Date();
      setTimeout(() => $('lAmount').focus(), 350);
    }
    function selectLoanType(el, type) {
      document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      selectedLoanType = type;
      const descGroup = $('descGroup');
      if (descGroup) descGroup.style.display = (type === 'cafeteria' || type === 'other') ? 'block' : 'none';
    }
    function calculateInstallment() {
      const amount = parseMoney($('lAmount').value);
      const installments = parseInt($('lInstallments').value) || 0;
      const startDate = $('lStartDate').value;
      const day = parseInt($('lInstallmentDay').value) || 15;
      if (amount > 0 && installments > 0) {
        const amt = Math.round(amount / installments);
        $('lInstallmentAmount').value = amt;
      }
      if (startDate && installments > 0) {
        const end = addMonths(startDate, installments - 1);
        $('lEndDate').value = end;
      }
    }
    function calculateInstallmentsFromAmount() {
      const amount = parseMoney($('lAmount').value);
      const installmentAmount = parseMoney($('lInstallmentAmount').value);
      const startDate = $('lStartDate').value;
      if (amount > 0 && installmentAmount > 0) {
        const installments = Math.max(1, Math.ceil(amount / installmentAmount));
        $('lInstallments').value = installments;
      }
      if (startDate && $('lInstallments').value) {
        const end = addMonths(startDate, parseInt($('lInstallments').value) - 1);
        $('lEndDate').value = end;
      }
    }
    function openSheetAddLoanForTeacher() {
      const teacher = getTeachers().find(t => t.id === currentTeacherId);
      if (!teacher) return;
      selectedLoanType = 'advance';
      openSheet(`
        <div class="sheet-title">Nuevo Registro - ${escapeHtml(teacher.name)}</div>
        <form onsubmit="event.preventDefault(); saveLoan('${teacher.id}');">
          <div class="input-group"><label>Tipo</label>
            <div class="radio-group">
              <div class="radio-option selected" onclick="selectLoanType(this, 'advance')" data-type="advance"><div class="radio-icon">💰</div><div class="radio-label">Adelanto</div><div class="radio-sublabel">De salario</div></div>
              <div class="radio-option" onclick="selectLoanType(this, 'cafeteria')" data-type="cafeteria"><div class="radio-icon">🍽️</div><div class="radio-label">Merienda</div><div class="radio-sublabel">Cafetería</div></div>
              <div class="radio-option" onclick="selectLoanType(this, 'other')" data-type="other"><div class="radio-icon">📋</div><div class="radio-label">Otro</div><div class="radio-sublabel">Consumo/vario</div></div>
            </div>
          </div>
          <div class="input-group" id="descGroup" style="display:none;"><label>Descripción (qué consumió)</label><input type="text" class="input" id="lDescription" placeholder="Ej: Almuerzo + jugo + galletas"></div>
          <div class="input-group"><label>Monto</label><input type="number" class="input" id="lAmount" placeholder="Ej: 500000" min="1" step="1000" required></div>
          <div class="input-group"><label>Fecha del registro</label><input type="date" class="input" id="lDate" required></div>
          <div style="background:var(--bg-glass);border-radius:var(--radius-sm);padding:16px;margin-bottom:20px;border:1px solid var(--border-glass);">
            <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.8px;">Plan de descuentos de nómina</div>
            <div class="input-group"><label>Inicio descuento</label><input type="date" class="input" id="lStartDate"></div>
            <div class="input-group"><label>Número de cuotas</label><input type="number" class="input" id="lInstallments" placeholder="Ej: 3" min="1" max="48" onchange="calculateInstallment()"></div>
            <div class="input-group"><label>Día de descuento (del mes)</label><input type="number" class="input" id="lInstallmentDay" placeholder="Ej: 15" min="1" max="31" onchange="calculateInstallment()"></div>
            <div style="display:flex;gap:10px;">
              <div class="input-group" style="flex:1;"><label>Monto cuota</label><input type="number" class="input" id="lInstallmentAmount" placeholder="Calculado" min="1" step="1000" onchange="calculateInstallmentsFromAmount()"></div>
              <div class="input-group" style="flex:1;"><label>Fin descuento</label><input type="date" class="input" id="lEndDate" readonly style="color:var(--text-muted);"></div>
            </div>
          </div>
          <div class="input-group"><label>Notas adicionales</label><input type="text" class="input" id="lNotes" placeholder="Ej: Urgente, descontar antes de vacaciones"></div>
          <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">Guardar</button>
        </form>
      `);
      $('lDate').valueAsDate = new Date();
      setTimeout(() => $('lAmount').focus(), 350);
    }
    function saveLoan(forcedTeacherId) {
      const teacherId = forcedTeacherId || $('lTeacher').value;
      const amount = parseMoney($('lAmount').value);
      const date = $('lDate').value;
      const description = $('lDescription') ? $('lDescription').value.trim() : '';
      const startDate = $('lStartDate').value;
      const endDate = $('lEndDate').value;
      const installments = parseInt($('lInstallments').value) || 0;
      const installmentAmount = parseMoney($('lInstallmentAmount').value);
      const installmentDay = parseInt($('lInstallmentDay').value) || null;
      const notes = $('lNotes').value.trim();
      if (!teacherId || amount <= 0 || !date) { showToast('Completa los campos obligatorios', 'error'); return; }
      const loans = getLoans();
      loans.push({
        id: DB.id(), teacherId, type: selectedLoanType, description, amount, date,
        startDate, endDate, installments, installmentAmount, installmentDay,
        notes, status: 'active', createdAt: DB.now()
      });
      setLoans(loans);
      closeSheet();
      showToast('Registro guardado');
      if (currentTeacherId === teacherId) renderTeacherDetail();
      else if ($('screenDashboard').classList.contains('active')) renderDashboard();
    }
    
    // ===== PAYMENTS =====
    function openSheetAddPayment(loanId, isSalary) {
      const loan = getLoans().find(l => l.id === loanId);
      if (!loan) return;
      const teacher = getTeachers().find(t => t.id === loan.teacherId);
      const balance = getLoanBalance(loan);
      openSheet(`
        <div class="sheet-title">${isSalary ? 'Descontar de Salario' : 'Registrar Abono Libre'}</div>
        <div style="background:var(--bg-card);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:20px;border:1px solid var(--border-glass);">
          <div style="font-size:13px;color:var(--text-secondary);margin-bottom:4px;">Saldo por descontar</div>
          <div style="font-size:20px;font-weight:700;color:var(--danger);">${formatCurrency(balance)}</div>
          ${teacher ? `<div style="font-size:12px;color:var(--text-muted);margin-top:6px;">Docente: ${escapeHtml(teacher.name)}</div>` : ''}
        </div>
        <form onsubmit="event.preventDefault(); savePayment('${loanId}', ${isSalary ? 'true' : 'false'});">
          <div class="input-group"><label>Monto ${isSalary ? 'a descontar' : 'del abono'}</label><input type="number" class="input" id="pAmount" placeholder="Ej: 200000" min="1" max="${balance}" step="1000" required></div>
          <div class="input-group"><label>Fecha del descuento</label><input type="date" class="input" id="pDate" required></div>
          <div class="input-group"><label>Notas (opcional)</label><input type="text" class="input" id="pNotes" placeholder="${isSalary ? 'Ej: Descuento quincena mayo' : 'Ej: Pago en efectivo'}"></div>
          <button type="submit" class="btn ${isSalary ? 'btn-secondary' : 'btn-success'} btn-block" style="margin-top:8px;">${isSalary ? 'Registrar Descuento' : 'Registrar Abono'}</button>
        </form>
      `);
      $('pDate').valueAsDate = new Date();
      setTimeout(() => $('pAmount').focus(), 350);
    }
    function registerInstallmentPayment(loanId) {
      const loan = getLoans().find(l => l.id === loanId);
      if (!loan) return;
      const instStatus = getInstallmentStatus(loan);
      if (instStatus.nextIndex < 0 || instStatus.nextIndex >= loan.installments) {
        showToast('Todas las cuotas ya fueron descontadas', 'warning');
        return;
      }
      const amount = loan.installmentAmount || 0;
      const date = todayStr();
      const payments = getPayments();
      payments.push({
        id: DB.id(), loanId, amount, date, notes: 'Descuento de cuota #' + (instStatus.nextIndex + 1),
        type: 'installment', installmentNumber: instStatus.nextIndex + 1, createdAt: DB.now()
      });
      setPayments(payments);
      const newBalance = getLoanBalance(loan);
      if (newBalance <= 0) {
        const loans = getLoans();
        const idx = loans.findIndex(l => l.id === loanId);
        if (idx >= 0) { loans[idx].status = 'paid'; setLoans(loans); }
      }
      showToast('Cuota #' + (instStatus.nextIndex + 1) + ' descontada');
      if (currentLoanId === loanId) renderLoanDetail();
      else if (currentTeacherId === loan.teacherId) renderTeacherDetail();
      else if ($('screenDashboard').classList.contains('active')) renderDashboard();
    }
    function savePayment(loanId, isSalary) {
      const amount = parseMoney($('pAmount').value);
      const date = $('pDate').value;
      const notes = $('pNotes').value.trim();
      const loan = getLoans().find(l => l.id === loanId);
      if (!loan || amount <= 0 || !date) { showToast('Completa todos los campos', 'error'); return; }
      const balance = getLoanBalance(loan);
      if (amount > balance) { showToast('El monto excede el saldo por descontar', 'error'); return; }
      const payments = getPayments();
      payments.push({ id: DB.id(), loanId, amount, date, notes, type: isSalary ? 'salary' : 'payment', createdAt: DB.now() });
      setPayments(payments);
      const newBalance = balance - amount;
      if (newBalance <= 0) {
        const loans = getLoans();
        const idx = loans.findIndex(l => l.id === loanId);
        if (idx >= 0) { loans[idx].status = 'paid'; setLoans(loans); }
      }
      closeSheet();
      showToast(isSalary ? 'Descuento registrado' : 'Abono registrado');
      if (currentLoanId === loanId) renderLoanDetail();
      else if (currentTeacherId === loan.teacherId) renderTeacherDetail();
      else if ($('screenDashboard').classList.contains('active')) renderDashboard();
    }
    
    // ===== DATA MENU =====
    function showDataMenu() {
      $('menuOverlay').classList.add('active');
      $('menuSheet').classList.add('active');
    }
    function closeDataMenu() {
      $('menuSheet').classList.remove('active');
      $('menuOverlay').classList.remove('active');
    }
    function exportData() {
      const data = { teachers: getTeachers(), loans: getLoans(), payments: getPayments(), exportedAt: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'edu-descuentos-backup-' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Datos exportados');
    }
    function importData() {
      $('importFile').click();
    }
    function handleImportFile(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.teachers) setTeachers(data.teachers);
          if (data.loans) setLoans(data.loans);
          if (data.payments) setPayments(data.payments);
          showToast('Datos importados correctamente');
          renderDashboard();
          showScreen('screenDashboard');
        } catch(err) {
          showToast('Error al importar: archivo inválido', 'error');
        }
      };
      reader.readAsText(file);
      input.value = '';
    }
    function confirmResetData() {
      openSheet(`
        <div class="sheet-title" style="color:var(--danger)">¿Borrar todo?</div>
        <p style="text-align:center;color:var(--text-secondary);font-size:14px;margin-bottom:24px;">Esta acción eliminará todos los docentes, registros y descuentos. No se puede deshacer.</p>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-secondary btn-block" onclick="closeSheet()">Cancelar</button>
          <button class="btn btn-danger btn-block" onclick="resetAllData()">Sí, borrar todo</button>
        </div>
      `);
    }
    function resetAllData() {
      localStorage.removeItem(KEYS.TEACHERS);
      localStorage.removeItem(KEYS.LOANS);
      localStorage.removeItem(KEYS.PAYMENTS);
      closeSheet();
      showToast('Todos los datos han sido eliminados');
      currentTeacherId = null;
      currentLoanId = null;
      renderDashboard();
      showScreen('screenDashboard');
    }
    
    // ===== INIT =====
    renderDashboard();
  </script>
</body>
</html>
