<body>

  <script>
    // ===== DATA LAYER =====
    const DB = {
      get: (key, def) => { try { return JSON.parse(localStorage.getItem(key) || 'null') || def; } catch(e) { return def; } },
      set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
      now: () => new Date().toISOString(),
      id: () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5)
    };
    const KEYS = { TEACHERS: 'ep_teachers', RECORDS: 'ep_records', PAYMENTS: 'ep_payments' };
    function getTeachers() { return DB.get(KEYS.TEACHERS, []); }
    function setTeachers(t) { DB.set(KEYS.TEACHERS, t); }
    function getRecords() { return DB.get(KEYS.RECORDS, []); }
    function setRecords(r) { DB.set(KEYS.RECORDS, r); }
    function getPayments() { return DB.get(KEYS.PAYMENTS, []); }
    function setPayments(p) { DB.set(KEYS.PAYMENTS, p); }
    
    // ===== UI UTILITIES =====
    function $(id) { return document.getElementById(id); }
    function showToast(msg, type) {
      type = type || 'success';
      const t = $('toast'), icon = $('toastIcon'), m = $('toastMsg');
      m.textContent = msg;
      icon.textContent = type === 'success' ? '✓' : type === 'warning' ? '!' : '✕';
      t.className = 'toast ' + type + ' show';
      setTimeout(() => t.classList.remove('show'), 2800);
    }
    function openSheet(html) {
      $('sheetContent').innerHTML = html;
      $('sheetOverlay').classList.add('active');
      $('sheet').classList.add('active');
    }
    function closeSheet() {
      $('sheet').classList.remove('active');
      $('sheetOverlay').classList.remove('active');
    }
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      $(id).classList.add('active');
      window.scrollTo(0, 0);
    }
    function setNavActive(id) {
      document.querySelectorAll('.bottom-nav-item').forEach(n => n.classList.remove('active'));
      $(id).classList.add('active');
    }
    function formatCurrency(n) {
      return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n || 0);
    }
    function formatDate(d) {
      if (!d) return '';
      const date = new Date(d + 'T00:00:00');
      return date.toLocaleDateString('es-CO', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function formatMonthYear(d) {
      if (!d) return '';
      const date = new Date(d + 'T00:00:00');
      return date.toLocaleDateString('es-CO', { month: 'long', year: 'numeric' });
    }
    function escapeHtml(s) {
      const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;
    }
    function parseMoney(v) {
      const n = parseFloat(String(v).replace(/[^0-9.-]/g, ''));
      return isNaN(n) ? 0 : Math.round(n);
    }
    function addMonths(dateStr, months) {
      const d = new Date(dateStr + 'T00:00:00');
      d.setMonth(d.getMonth() + months);
      return d.toISOString().split('T')[0];
    }
    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }
    function getMonthName(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('es-CO', { month: 'long' });
    }
    function copyToClipboard(text) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => showToast('Copiado al portapapeles'));
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Copiado al portapapeles');
      }
    }
    
    // ===== SERVICE WORKER =====
    const swCode = `const CACHE='edu-descuentos-v3';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(c=>c!==CACHE).map(c=>caches.delete(c))))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const c=res.clone();caches.open(CACHE).then(ca=>ca.put(e.request,c));return res;})).catch(()=>caches.match(e.request))));`;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register(swUrl).catch(()=>{});
    
    // ===== RECORD TYPE LABELS =====
    const RECORD_TYPES = {
      prestamo: { label: 'Préstamo', icon: '💰', class: 'prestamo' },
      descuento: { label: 'Descuento', icon: '📋', class: 'descuento' }
    };
    
    // ===== CALCULATIONS =====
    function getRecordPayments(recordId) {
      return getPayments().filter(p => p.recordId === recordId).sort((a, b) => new Date(a.date) - new Date(b.date));
    }
    function getRecordBalance(record) {
      const paid = getRecordPayments(record.id).reduce((s, p) => s + (p.amount || 0), 0);
      return Math.max(0, (record.amount || 0) - paid);
    }
    function getTeacherPrestamoBalance(teacherId) {
      return getRecords().filter(r => r.teacherId === teacherId && r.type === 'prestamo').reduce((s, r) => s + getRecordBalance(r), 0);
    }
    function getTeacherDescuentoBalance(teacherId) {
      return getRecords().filter(r => r.teacherId === teacherId && r.type === 'descuento' && !r.deductFromLiquidation).reduce((s, r) => s + getRecordBalance(r), 0);
    }
    function getTeacherLiquidationBalance(teacherId) {
      return getRecords().filter(r => r.teacherId === teacherId && r.type === 'descuento' && r.deductFromLiquidation).reduce((s, r) => s + getRecordBalance(r), 0);
    }
    function getTeacherTotalPrestamos(teacherId) {
      return getRecords().filter(r => r.teacherId === teacherId && r.type === 'prestamo').reduce((s, r) => s + (r.amount || 0), 0);
    }
    function getTeacherTotalDescuentos(teacherId) {
      return getRecords().filter(r => r.teacherId === teacherId && r.type === 'descuento').reduce((s, r) => s + (r.amount || 0), 0);
    }
    function getTeacherTotalPaid(teacherId) {
      const recordIds = getRecords().filter(r => r.teacherId === teacherId).map(r => r.id);
      return getPayments().filter(p => recordIds.includes(p.recordId)).reduce((s, p) => s + (p.amount || 0), 0);
    }
    
    // ===== INSTALLMENT LOGIC =====
    function generateInstallmentDates(record) {
      if (!record.startDate || !record.installments || record.installments <= 0) return [];
      const dates = [];
      const start = new Date(record.startDate + 'T00:00:00');
      const day = record.installmentDay || start.getDate();
      for (let i = 0; i < record.installments; i++) {
        const d = new Date(start);
        d.setMonth(d.getMonth() + i);
        d.setDate(Math.min(day, new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate()));
        dates.push(d.toISOString().split('T')[0]);
      }
      return dates;
    }
    function getInstallmentStatus(record) {
      const payments = getRecordPayments(record.id);
      const totalPaid = payments.reduce((s, p) => s + (p.amount || 0), 0);
      const dates = generateInstallmentDates(record);
      let paidCount = 0;
      let nextIndex = -1;
      dates.forEach((date, idx) => {
        const cumulativeExpected = (idx + 1) * (record.installmentAmount || 0);
        if (totalPaid >= cumulativeExpected) {
          paidCount++;
        } else if (nextIndex === -1) {
          nextIndex = idx;
        }
      });
      if (nextIndex === -1 && paidCount < dates.length) nextIndex = paidCount;
      return { dates, paidCount, totalPaid, nextIndex, remaining: dates.length - paidCount };
    }
    function getMonthDeductions(teacherId, year, month) {
      const records = getRecords().filter(r => r.teacherId === teacherId && r.type === 'descuento' && r.status !== 'paid' && !r.deductFromLiquidation);
      let total = 0;
      const details = [];
      records.forEach(r => {
        const status = getInstallmentStatus(r);
        status.dates.forEach((date, idx) => {
          if (idx < status.paidCount) return;
          const d = new Date(date + 'T00:00:00');
          if (d.getFullYear() === year && d.getMonth() === month) {
            total += r.installmentAmount || 0;
            details.push({ record: r, date, installmentNumber: idx + 1, amount: r.installmentAmount || 0 });
          }
        });
      });
      return { total, details };
    }
    function getLiquidationRecords() {
      return getRecords().filter(r => r.type === 'descuento' && r.deductFromLiquidation && r.status !== 'paid');
    }
    function getLiquidationTotal() {
      return getLiquidationRecords().reduce((s, r) => s + getRecordBalance(r), 0);
    }
    
    // ===== DASHBOARD =====
    function renderDashboard() {
      const teachers = getTeachers();
      const records = getRecords();
      const payments = getPayments();
      const totalPrestamos = records.filter(r => r.type === 'prestamo').reduce((s, r) => s + getRecordBalance(r), 0);
      const totalDescuentos = records.filter(r => r.type === 'descuento' && !r.deductFromLiquidation).reduce((s, r) => s + getRecordBalance(r), 0);
      const totalLiquidacion = getLiquidationTotal();
      const totalPending = totalPrestamos + totalDescuentos + totalLiquidacion;
      $('statTotalPrestamos').textContent = formatCurrency(totalPrestamos);
      $('statTotalDescuentos').textContent = formatCurrency(totalDescuentos);
      $('statTotalPending').textContent = formatCurrency(totalPending);
      $('statLiquidacion').textContent = formatCurrency(totalLiquidacion);
      
      // Liquidation alerts (show in Nov, Dec, Jan)
      const now = new Date();
      const currentMonth = now.getMonth();
      const alertDiv = $('liquidationAlerts');
      const liqRecords = getLiquidationRecords();
      if ((currentMonth >= 10 || currentMonth <= 0) && liqRecords.length > 0) {
        const liqByTeacher = {};
        liqRecords.forEach(r => {
          if (!liqByTeacher[r.teacherId]) liqByTeacher[r.teacherId] = 0;
          liqByTeacher[r.teacherId] += getRecordBalance(r);
        });
        let alertHtml = `<div class="section-title">⚠️ Alertas de liquidación</div>`;
        Object.entries(liqByTeacher).forEach(([tid, amount]) => {
          const teacher = teachers.find(t => t.id === tid);
          if (teacher) {
            alertHtml += `
              <div class="alert-card animate-fade" onclick="showTeacherDetail('${tid}')">
                <div class="alert-card-header">

    // ===== LIQUIDATION SCREEN =====
    function renderLiquidation() {
      const records = getLiquidationRecords();
      const teachers = getTeachers();
      const content = $('liquidationContent');
      if (records.length === 0) {
        content.innerHTML = `
          <div class="empty-state animate-fade">
            <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
            <div class="empty-title">Sin descuentos de liquidación</div>
            <div class="empty-text">No hay descuentos marcados para descontar de la liquidación final.</div>
          </div>`;
        return;
      }
      const byTeacher = {};
      records.forEach(r => {
        if (!byTeacher[r.teacherId]) byTeacher[r.teacherId] = [];
        byTeacher[r.teacherId].push(r);
      });
      let html = `<div class="section-title">Descuentos de liquidación</div>`;
      Object.entries(byTeacher).forEach(([tid, recs]) => {
        const teacher = teachers.find(t => t.id === tid);
        if (!teacher) return;
        const total = recs.reduce((s, r) => s + getRecordBalance(r), 0);
        html += `
          <div class="dashboard-card animate-fade">
            <div class="dashboard-card-header">
              <div>
                <div class="dashboard-card-title">${escapeHtml(teacher.name)}</div>
                <div class="dashboard-card-subtitle">${teacher.role || 'Docente'}</div>
              </div>
              <div class="list-amount negative">${formatCurrency(total)}</div>
            </div>`;
        recs.forEach(r => {
          const bal = getRecordBalance(r);
          html += `
            <div class="condition-row" onclick="showRecordDetail('${r.id}')" style="cursor:pointer;">
              <span class="condition-label">${escapeHtml(r.concept || 'Sin concepto')}</span>
              <span class="condition-value">${formatCurrency(bal)} / ${formatCurrency(r.amount)}</span>
            </div>`;
        });
        html += `</div>`;
      });
      content.innerHTML = html;
    }
    
    // ===== MONTH PAYROLL SHEET =====
    function openSheetMonthPayroll() {
      const now = new Date();
      const monthName = now.toLocaleDateString('es-CO', { month: 'long', year: 'numeric' });
      const teachers = getTeachers();
      let totalDeductions = 0;
      let totalNet = 0;
      
      const rows = teachers.map(t => {
        const ded = getMonthDeductions(t.id, now.getFullYear(), now.getMonth());
        const net = (t.salary || 0) - ded.total;
        totalDeductions += ded.total;
        totalNet += net;
        if (ded.total === 0) return '';
        return `
          <div class="payroll-teacher-card animate-fade">
            <div class="payroll-teacher-header">
              <div class="payroll-teacher-name">${escapeHtml(t.name)}</div>
              <div class="payroll-teacher-net">${formatCurrency(net)}</div>
            </div>
            <div class="payroll-teacher-detail">Salario: ${formatCurrency(t.salary)} · Descuento: <span>${formatCurrency(ded.total)}</span></div>
            <div style="margin-top:8px;font-size:12px;color:var(--text-muted);">
              ${ded.details.map(d => `Cuota ${d.installmentNumber} · ${formatDate(d.date)} · ${formatCurrency(d.amount)}`).join('<br>')}
            </div>
          </div>`;
      }).join('');
      
      openSheet(`
        <div class="sheet-title">Nómina de ${monthName}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;">
          <div class="installment-summary-item"><div class="installment-summary-value" style="color:var(--text-primary)">${teachers.length}</div><div class="installment-summary-label">Docentes</div></div>
          <div class="installment-summary-item"><div class="installment-summary-value" style="color:var(--danger)">${formatCurrency(totalDeductions)}</div><div class="installment-summary-label">Descuentos</div></div>
          <div class="installment-summary-item"><div class="installment-summary-value" style="color:var(--success)">${formatCurrency(totalNet)}</div><div class="installment-summary-label">Total a pagar</div></div>
        </div>
        ${rows || '<div class="empty-state" style="padding:30px 0;"><div class="empty-text">No hay descuentos programados para este mes</div></div>'}
      `);
    }
    
    // ===== TEACHER DETAIL =====
    let currentTeacherId = null;
    let currentRecordId = null;
    let teacherDetailTab = 'descuentos';

      currentTeacherId = id;
      teacherDetailTab = 'descuentos';

      const descuentoBal = getTeacherDescuentoBalance(teacher.id);

      const initials = (teacher.name || '').split(' ').map(w => w[0]).join('').substr(0, 2).toUpperCase();

      const prestamos = allRecords.filter(r => r.type === 'prestamo');

      const allPayments = getPayments().filter(p => allRecordIds.includes(p.recordId)).sort((a, b) => new Date(b.date) - new Date(a.date));
      
      // Month payroll for this teacher

      let content = `

          <div class="detail-salary">Salario: <strong>${formatCurrency(teacher.salary)}</strong></div>

      // This month payroll card
      content += `
        <div class="payroll-card animate-fade stagger-1">
          <div class="payroll-title">${monthName} — Resumen de nómina</div>

          <div class="payroll-row"><span class="payroll-label">Descuentos este mes</span><span class="payroll-value deduction">-${formatCurrency(monthDed.total)}</span></div>
          ${monthDed.details.length > 0 ? `<div style="font-size:12px;color:var(--text-muted);margin:4px 0 8px;padding-left:8px;">${monthDed.details.map(d => `• Cuota ${d.installmentNumber} de ${escapeHtml(d.record.concept || 'descuento')}: ${formatCurrency(d.amount)}`).join('<br>')}</div>` : ''}
          <div class="payroll-total"><span class="payroll-label" style="font-size:15px;">A pagar este mes</span><span class="payroll-value net">${formatCurrency((teacher.salary || 0) - monthDed.total)}</span></div>
        </div>
        
        <div style="padding:0 20px 16px;">
          <button class="copy-btn" onclick="copyTeacherSummary('${teacher.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copiar resumen para el docente
          </button>
        </div>
        
        <div class="detail-stats animate-fade stagger-2">
          <div class="detail-stat"><div class="detail-stat-value" style="color:var(--info)">${formatCurrency(prestamoBal)}</div><div class="detail-stat-label">Préstamos</div></div>
          <div class="detail-stat"><div class="detail-stat-value" style="color:var(--warning)">${formatCurrency(descuentoBal)}</div><div class="detail-stat-label">Descuentos</div></div>
          <div class="detail-stat"><div class="detail-stat-value" style="color:${liqBal > 0 ? 'var(--danger)' : 'var(--success)'}">${formatCurrency(liqBal)}</div><div class="detail-stat-label">Liquidación</div></div>
        </div>
        <div class="tabs animate-fade stagger-3">
          <button class="tab ${teacherDetailTab === 'descuentos' ? 'active' : ''}" onclick="teacherDetailTab='descuentos';renderTeacherDetail();">Descuentos</button>
          <button class="tab ${teacherDetailTab === 'prestamos' ? 'active' : ''}" onclick="teacherDetailTab='prestamos';renderTeacherDetail();">Préstamos</button>
          <button class="tab ${teacherDetailTab === 'history' ? 'active' : ''}" onclick="teacherDetailTab='history';renderTeacherDetail();">Historial</button>
        </div>
        <div class="content" style="padding-top:8px;">`;
      
      if (teacherDetailTab === 'descuentos') {

          content += `
            <div class="empty-state animate-fade">
              <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
              <div class="empty-title">Sin descuentos</div>
              <div class="empty-text">Este docente no tiene descuentos de nómina activos.</div>
            </div>`;
        } else {
          content += items.map((r, i) => renderRecordCard(r, i)).join('');
        }
      } else if (teacherDetailTab === 'prestamos') {
        if (prestamos.length === 0) {
          content += `
            <div class="empty-state animate-fade">
              <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
              <div class="empty-title">Sin préstamos</div>
              <div class="empty-text">Este docente no tiene préstamos registrados.</div>
            </div>`;
        } else {
          content += prestamos.map((r, i) => renderRecordCard(r, i)).join('');
        }
      } else {
        if (allPayments.length === 0) {
          content += `
            <div class="empty-state animate-fade">
              <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
              <div class="empty-title">Sin movimientos</div>
              <div class="empty-text">No hay abonos ni descuentos registrados.</div>
            </div>`;
        } else {
          content += allPayments.map((p, i) => {
            const record = allRecords.find(r => r.id === p.recordId);
            return `
              <div class="timeline-item animate-fade stagger-${Math.min(i+1, 5)}">
                <div class="timeline-dot ${p.type === 'installment' ? 'installment' : p.type === 'liquidation' ? 'liquidation' : 'payment'}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    ${p.type === 'installment' ? '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' : p.type === 'liquidation' ? '<path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>' : '<polyline points="20 6 9 17 4 12"/>'}
                  </svg>
                </div>
                <div class="timeline-content">
                  <div class="timeline-title">${p.type === 'installment' ? 'Descuento cuota #' + (p.installmentNumber || '') : p.type === 'liquidation' ? 'Descuento de liquidación' : 'Abono'}</div>
                  <div class="timeline-desc">${record ? (RECORD_TYPES[record.type] || RECORD_TYPES.descuento).label + ': ' + escapeHtml(record.concept || '') : ''}</div>
                  <div class="timeline-date">${formatDate(p.date)}${p.notes ? ' · ' + escapeHtml(p.notes) : ''}</div>
                </div>
                <div class="timeline-amount positive">${formatCurrency(p.amount)}</div>
              </div>`;
          }).join('');
        }
      }
      content += `</div>`;
      $('teacherDetailContent').innerHTML = content;
    }
    
    function renderRecordCard(r, i) {
      const bal = getRecordBalance(r);
      const pct = r.amount > 0 ? ((r.amount - bal) / r.amount * 100) : 0;
      const status = bal <= 0 ? 'paid' : 'active';
      const typeInfo = RECORD_TYPES[r.type] || RECORD_TYPES.descuento;
      const instStatus = r.type === 'descuento' && r.installments > 0 ? getInstallmentStatus(r) : null;
      return `
        <div class="loan-card animate-fade stagger-${Math.min(i+1, 5)}" onclick="showRecordDetail('${r.id}')">
          <div class="loan-card-header">
            <div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                <span class="type-badge ${typeInfo.class}">${typeInfo.icon} ${typeInfo.label}</span>
                ${r.deductFromLiquidation ? '<span class="badge-liquidation">Liquidación</span>' : ''}
              </div>
              <div style="font-size:14px;font-weight:500;margin-bottom:2px;">${escapeHtml(r.concept || '')}</div>
              <div class="loan-card-date">${formatDate(r.date)}</div>
            </div>
            <div class="list-badge ${status === 'paid' ? 'badge-success' : 'badge-warning'}">${status === 'paid' ? 'Completado' : 'Activo'}</div>
          </div>
          <div class="loan-card-amount currency">${formatCurrency(r.amount)}</div>
          <div class="loan-card-balance">${bal > 0 ? 'Por descontar: ' + formatCurrency(bal) : 'Totalmente descontado'}</div>
          ${instStatus && r.installments > 0 ? `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">Cuotas: ${instStatus.paidCount}/${r.installments} descontadas · ${formatCurrency(r.installmentAmount || 0)} c/u</div>` : ''}
          ${bal > 0 ? `<div class="progress-bar"><div class="progress-fill ${pct > 75 ? 'success' : pct > 40 ? 'warning' : 'danger'}" style="width:${pct}%"></div></div>` : ''}
          <div class="loan-card-actions" style="margin-top:14px;">
            ${r.type === 'descuento' && r.installments > 0 && !r.deductFromLiquidation ? `<button class="btn btn-info btn-sm" onclick="event.stopPropagation();registerInstallmentPayment('${r.id}')">Descontar cuota</button>` : ''}
            ${r.type === 'descuento' && r.deductFromLiquidation ? `<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();registerLiquidationPayment('${r.id}')">Descontar liquidación</button>` : ''}
            <button class="btn btn-success btn-sm" onclick="event.stopPropagation();openSheetAddPayment('${r.id}')">Abono</button>
          </div>
        </div>`;
    }
    
    // ===== COPY TEACHER SUMMARY =====
    function copyTeacherSummary(teacherId) {
      const teacher = getTeachers().find(t => t.id === teacherId);
      if (!teacher) return;
      const now = new Date();
      const monthDed = getMonthDeductions(teacherId, now.getFullYear(), now.getMonth());
      const records = getRecords().filter(r => r.teacherId === teacherId).sort((a, b) => new Date(b.date) - new Date(a.date));
      const allPayments = getPayments().filter(p => records.some(r => r.id === p.recordId)).sort((a, b) => new Date(b.date) - new Date(a.date));
      
      let text = `📋 RESUMEN DE NÓMINA — ${teacher.name.toUpperCase()}\n`;
      text += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
      text += `💰 Salario bruto: ${formatCurrency(teacher.salary)}\n`;
      text += `➖ Descuentos ${now.toLocaleDateString('es-CO', {month:'long'})}: ${formatCurrency(monthDed.total)}\n`;
      if (monthDed.details.length > 0) {
        monthDed.details.forEach(d => {
          text += `   • Cuota ${d.installmentNumber} de ${d.record.concept || 'descuento'}: ${formatCurrency(d.amount)}\n`;
        });
      }
      text += `✅ A pagar este mes: ${formatCurrency((teacher.salary || 0) - monthDed.total)}\n\n`;
      
      text += `📊 HISTORIAL COMPLETO\n`;
      text += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
      if (records.length === 0) {
        text += `No hay registros.\n`;
      } else {
        records.forEach(r => {
          const typeInfo = RECORD_TYPES[r.type] || RECORD_TYPES.descuento;
          const bal = getRecordBalance(r);
          const paid = (r.amount || 0) - bal;
          text += `\n${typeInfo.icon} ${typeInfo.label}${r.deductFromLiquidation ? ' (Liquidación)' : ''}\n`;
          text += `   Concepto: ${r.concept || 'N/A'}\n`;
          text += `   Fecha: ${formatDate(r.date)}\n`;
          text += `   Monto total: ${formatCurrency(r.amount)}\n`;
          text += `   Descontado: ${formatCurrency(paid)}\n`;
          text += `   Por descontar: ${formatCurrency(bal)}\n`;
          if (r.installments > 0) {
            text += `   Cuotas: ${r.installments} de ${formatCurrency(r.installmentAmount || 0)} c/u\n`;
            text += `   Desde: ${formatDate(r.startDate)} hasta ${formatDate(r.endDate)}\n`;
          }
        });
      }
      
      text += `\n📅 DESCUENTOS REALIZADOS\n`;
      text += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
      if (allPayments.length === 0) {
        text += `Aún no se han realizado descuentos.\n`;
      } else {
        allPayments.forEach(p => {
          const record = records.find(r => r.id === p.recordId);
          const label = p.type === 'installment' ? `Cuota #${p.installmentNumber}` : p.type === 'liquidation' ? 'Liquidación' : 'Abono';
          text += `• ${formatDate(p.date)} — ${label}: ${formatCurrency(p.amount)}\n`;
        });
      }
      
      text += `\n💡 Total adeudado: ${formatCurrency(getTeacherPrestamoBalance(teacherId) + getTeacherDescuentoBalance(teacherId) + getTeacherLiquidationBalance(teacherId))}\n`;
      const liqBal = getTeacherLiquidationBalance(teacherId);
      if (liqBal > 0) {
        text += `⚠️ Total para liquidación: ${formatCurrency(liqBal)}\n`;
      }
      text += `Generado el ${now.toLocaleDateString('es-CO')}`;
      
      copyToClipboard(text);
    }
    
    // ===== RECORD DETAIL =====
    function showRecordDetail(recordId) {
      currentRecordId = recordId;
      renderRecordDetail();
      showScreen('screenRecord');
    }
    function goBackFromRecord() {
      const record = getRecords().find(r => r.id === currentRecordId);
      if (record) showTeacherDetail(record.teacherId);
      else showScreen('screenDashboard');
    }
    function renderRecordDetail() {
      const record = getRecords().find(r => r.id === currentRecordId);
      if (!record) return goBackFromRecord();
      const teacher = getTeachers().find(t => t.id === record.teacherId);
      const payments = getRecordPayments(record.id);
      const balance = getRecordBalance(record);
      const pct = record.amount > 0 ? ((record.amount - balance) / record.amount * 100) : 0;
      const typeInfo = RECORD_TYPES[record.type] || RECORD_TYPES.descuento;
      const instStatus = record.type === 'descuento' && record.installments > 0 ? getInstallmentStatus(record) : null;
      
      let content = `
        <div class="detail-header animate-fade">
          <div style="margin-bottom:12px;"><span class="type-badge ${typeInfo.class}">${typeInfo.icon} ${typeInfo.label}</span>${record.deductFromLiquidation ? ' <span class="badge-liquidation">Liquidación</span>' : ''}</div>
          <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">${teacher ? escapeHtml(teacher.name) : ''}</div>
          <div class="detail-name">${escapeHtml(record.concept || typeInfo.label)}</div>
          <div class="detail-role">${formatDate(record.date)}</div>
          <div class="detail-salary">Monto: <strong>${formatCurrency(record.amount)}</strong> · Por descontar: <strong style="color:${balance > 0 ? 'var(--danger)' : 'var(--success)'}">${formatCurrency(balance)}</strong></div>
        </div>`;

    function calculateRecordInstallment() {

        const amt = Math.round(amount / installments);
        $('rInstallmentAmount').value = amt;
      }
      if (startDate && installments > 0) {
        const end = addMonths(startDate, installments - 1);
        $('rEndDate').value = end;
      }
    }
    function calculateRecordInstallmentsFromAmount() {
      const amount = parseMoney($('rAmount').value);
      const installmentAmount = parseMoney($('rInstallmentAmount').value);
      const startDate = $('rStartDate').value;
      if (amount > 0 && installmentAmount > 0) {
        const installments = Math.max(1, Math.ceil(amount / installmentAmount));
        $('rInstallments').value = installments;
      }
      if (startDate && $('rInstallments').value) {
        const end = addMonths(startDate, parseInt($('rInstallments').value) - 1);
        $('rEndDate').value = end;
      }
    }

    function registerInstallmentPayment(recordId) {
      const record = getRecords().find(r => r.id === recordId);
      if (!record) return;
      const instStatus = getInstallmentStatus(record);
      if (instStatus.nextIndex < 0 || instStatus.nextIndex >= record.installments) {
        showToast('Todas las cuotas ya fueron descontadas', 'warning');
        return;
      }
      const amount = record.installmentAmount || 0;
      const date = todayStr();
      const payments = getPayments();
      payments.push({
        id: DB.id(), recordId, amount, date, notes: 'Descuento cuota #' + (instStatus.nextIndex + 1),
        type: 'installment', installmentNumber: instStatus.nextIndex + 1, createdAt: DB.now()
      });
      setPayments(payments);
      const newBalance = getRecordBalance(record);
      if (newBalance <= 0) {
        const records = getRecords();
        const idx = records.findIndex(r => r.id === recordId);
        if (idx >= 0) { records[idx].status = 'paid'; setRecords(records); }
      }
      showToast('Cuota #' + (instStatus.nextIndex + 1) + ' descontada');
      if (currentRecordId === recordId) renderRecordDetail();
      else if (currentTeacherId === record.teacherId) renderTeacherDetail();
      else if ($('screenDashboard').classList.contains('active')) renderDashboard();
    }
    function registerLiquidationPayment(recordId) {
      const record = getRecords().find(r => r.id === recordId);
      if (!record) return;
      const balance = getRecordBalance(record);
      if (balance <= 0) { showToast('Este descuento ya está completado', 'warning'); return; }
      const payments = getPayments();
      payments.push({
        id: DB.id(), recordId, amount: balance, date: todayStr(),
        notes: 'Descuento de liquidación final', type: 'liquidation', createdAt: DB.now()
      });
      setPayments(payments);
      const records = getRecords();
      const idx = records.findIndex(r => r.id === recordId);
      if (idx >= 0) { records[idx].status = 'paid'; setRecords(records); }
      showToast('Descuento de liquidación registrado');
      if (currentRecordId === recordId) renderRecordDetail();
      else if (currentTeacherId === record.teacherId) renderTeacherDetail();
      else if ($('screenDashboard').classList.contains('active')) renderDashboard();
    }
    function savePayment(recordId) {
      const amount = parseMoney($('pAmount').value);
      const date = $('pDate').value;
      const notes = $('pNotes').value.trim();
      const record = getRecords().find(r => r.id === recordId);
      if (!record || amount <= 0 || !date) { showToast('Completa todos los campos', 'error'); return; }
      const balance = getRecordBalance(record);
      if (amount > balance) { showToast('El monto excede el saldo por descontar', 'error'); return; }
      const payments = getPayments();
      payments.push({ id: DB.id(), recordId, amount, date, notes, type: 'payment', createdAt: DB.now() });
      setPayments(payments);
      const newBalance = balance - amount;
      if (newBalance <= 0) {
        const records = getRecords();
        const idx = records.findIndex(r => r.id === recordId);
        if (idx >= 0) { records[idx].status = 'paid'; setRecords(records); }
      }
      closeSheet();
      showToast('Abono registrado');
      if (currentRecordId === recordId) renderRecordDetail();
      else if (currentTeacherId === record.teacherId) renderTeacherDetail();
      else if ($('screenDashboard').classList.contains('active')) renderDashboard();
    }
    
    // ===== DATA MENU =====
    function showDataMenu() {
      $('menuOverlay').classList.add('active');
      $('menuSheet').classList.add('active');
    }
    function closeDataMenu() {
      $('menuSheet').classList.remove('active');
      $('menuOverlay').classList.remove('active');
    }
    function exportData() {
      const data = { teachers: getTeachers(), records: getRecords(), payments: getPayments(), exportedAt: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'edu-descuentos-backup-' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Datos exportados');
    }
    function importData() {
      $('importFile').click();
    }
    function handleImportFile(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.teachers) setTeachers(data.teachers);
          if (data.records || data.loans) setRecords(data.records || data.loans);
          if (data.payments) setPayments(data.payments);
          showToast('Datos importados correctamente');
          renderDashboard();
          showScreen('screenDashboard');
        } catch(err) {
          showToast('Error al importar: archivo inválido', 'error');
        }
      };
      reader.readAsText(file);
      input.value = '';
    }
    function confirmResetData() {
      openSheet(`
        <div class="sheet-title" style="color:var(--danger)">¿Borrar todo?</div>
        <p style="text-align:center;color:var(--text-secondary);font-size:14px;margin-bottom:24px;">Esta acción eliminará todos los docentes, registros y descuentos. No se puede deshacer.</p>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-secondary btn-block" onclick="closeSheet()">Cancelar</button>
          <button class="btn btn-danger btn-block" onclick="resetAllData()">Sí, borrar todo</button>
        </div>
      `);
    }
    function resetAllData() {
      localStorage.removeItem(KEYS.TEACHERS);
      localStorage.removeItem(KEYS.RECORDS);
      localStorage.removeItem(KEYS.PAYMENTS);
      closeSheet();
      showToast('Todos los datos han sido eliminados');
      currentTeacherId = null;
      currentRecordId = null;
      renderDashboard();
      showScreen('screenDashboard');
      setNavActive('navDashboard');
    }
    
    // ===== INIT =====
    renderDashboard();
  </script>
</body>
</html>
